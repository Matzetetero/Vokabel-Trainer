<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer - Deluxe Edition</title>
    <!-- Konfetti Library einbinden -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --error: #dc3545; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --error: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 500px; margin-top: 20px; }
        .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .top-bar button { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; border: none; background: #65676b; color: white; font-size: 0.8rem; }
        .btn-accent { background: var(--accent) !important; }
        input, select, .main-btn { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 1rem; transition: 0.2s; }
        .main-btn { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .stats-live { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 15px; color: var(--accent); }
        #feedback { min-height: 30px; margin: 15px 0; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .hidden { display: none; }
        .list-preview { margin-top: 20px; max-height: 150px; overflow-y: auto; font-size: 0.8rem; border-top: 1px solid #ccc; padding-top: 10px; }
        
        /* Animationen */
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .correct-anim { animation: successPop 0.4s ease; border: 2px solid var(--success) !important; background: rgba(46, 204, 113, 0.1); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .wrong-anim { animation: shake 0.4s ease; border: 2px solid var(--error) !important; background: rgba(231, 76, 60, 0.1); }
    </style>
</head>
<body onload="loadFromStorage()">

<div class="container">
    <div class="top-bar">
        <button class="btn-accent" onclick="toggleDark()">🌓 Dark Mode</button>
        <button onclick="exportList()">💾 Export</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import</button>
        <button onclick="clearList()" style="background: var(--error)">🗑️ Löschen</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(this)" accept=".json">
    </div>

    <div id="inputArea">
        <h2>Vokabeln verwalten</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button class="main-btn" onclick="addWord()">Wort hinzufügen</button>
        <p style="text-align: center;">Vokabeln in der Liste: <b id="wordCount">0</b></p>
        
        <div id="preview" class="list-preview">Keine Wörter vorhanden.</div>

        <hr>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Zufällig gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">Training starten</button>
    </div>

    <div id="trainingArea" class="hidden">
        <div class="stats-live">Richtig: <span id="correctNum">0</span> von <span id="processedNum">0</span></div>
        <h1 id="qWord" style="text-align: center;">---</h1>
        <input type="text" id="ansInput" placeholder="Antwort..." autocomplete="off">
        <button class="main-btn" onclick="check()">Überprüfen</button>
        <button class="main-btn" style="background: #65676b" onclick="skip()">Weiß ich nicht</button>
        <p id="feedback"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">Ergebnis</h2>
        <div id="statsDetails"></div>
        <button class="main-btn" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let vocab = [], session = [], wrongs = [], attempts = {};
    let correctInSession = 0, currentIdx = 0, task = {};

    function toggleDark() { document.body.classList.toggle('dark'); }

    function saveToStorage() {
        localStorage.setItem('vocab_v3', JSON.stringify(vocab));
        updateUI();
    }

    function loadFromStorage() {
        const data = localStorage.getItem('vocab_v3');
        if (data) vocab = JSON.parse(data);
        updateUI();
    }

    function updateUI() {
        document.getElementById('wordCount').innerText = vocab.length;
        const preview = document.getElementById('preview');
        if (vocab.length > 0) {
            preview.innerHTML = "<b>Vorschau:</b><br>" + vocab.slice(-5).map(v => `${v.f} = ${v.g}`).join('<br>');
        } else {
            preview.innerHTML = "Keine Wörter vorhanden.";
        }
    }

    function addWord() {
        const f = document.getElementById('foreign').value.trim(), g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: Date.now() + Math.random()});
            saveToStorage();
            document.getElementById('foreign').value = ''; document.getElementById('german').value = '';
            document.getElementById('foreign').focus();
        }
    }

    function startTraining() {
        if(vocab.length === 0) return alert("Bitte zuerst Vokabeln hinzufügen!");
        session = [...vocab].sort(() => Math.random() - 0.5);
        wrongs = []; currentIdx = 0; correctInSession = 0; attempts = {};
        vocab.forEach(v => attempts[v.id] = 1);
        show('trainingArea');
        next();
    }

    function next() {
        if(currentIdx >= session.length) {
            if(wrongs.length > 0) {
                session = [...wrongs].sort(() => Math.random() - 0.5);
                wrongs = []; currentIdx = 0; next();
            } else { show('resultArea'); renderStats(); return; }
        }
        document.getElementById('correctNum').innerText = correctInSession;
        document.getElementById('processedNum').innerText = currentIdx + 1;
        
        let word = session[currentIdx], m = document.getElementById('mode').value;
        let askF = m === 'foreign' || (m === 'mixed' && Math.random() > 0.5);
        task = { q: askF ? word.g : word.f, a: askF ? word.f : word.g, id: word.id };
        
        document.getElementById('qWord').innerText = task.q;
        const inp = document.getElementById('ansInput');
        inp.value = ''; inp.className = ''; 
        document.getElementById('feedback').innerText = '';
        inp.focus();
    }

    function check() {
        const inp = document.getElementById('ansInput');
        const feedback = document.getElementById('feedback');
        
        if(inp.value.trim().toLowerCase() === task.a.toLowerCase()) {
            // SUPER ANIMATION: Konfetti
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#2ecc71', '#4599ff', '#ffffff']
            });

            inp.classList.add('correct-anim');
            feedback.innerText = "Richtig! ✨";
            feedback.style.color = "var(--success)";
            
            if(attempts[task.id] === 1) correctInSession++;
            
            setTimeout(() => {
                currentIdx++;
                next();
            }, 800);
        } else {
            inp.classList.add('wrong-anim');
            feedback.innerText = `Falsch! Lösung: ${task.a}`;
            feedback.style.color = "var(--error)";
            
            const originalWord = vocab.find(v => v.id === task.id);
            if(!wrongs.some(w => w.id === task.id)) wrongs.push(originalWord);
            attempts[task.id] = 0;
        }
    }

    function skip() {
        const originalWord = vocab.find(v => v.id === task.id);
        if(!wrongs.some(w => w.id === task.id)) wrongs.push(originalWord);
        attempts[task.id] = 0;
        currentIdx++;
        next();
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(a => document.getElementById(a).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function renderStats() {
        const rate = Math.round((correctInSession / vocab.length) * 100);
        document.getElementById('statsDetails').innerHTML = `
            <h1 style="font-size: 3rem; text-align: center; margin: 10px 0;">${rate}%</h1>
            <p style="text-align: center;">Du hast ${correctInSession} von ${vocab.length} Wörtern direkt gewusst!</p>
        `;
        // Finales Konfetti-Feuerwerk am Ende
        confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } });
    }

    function clearList() { if(confirm("Wirklich alle Vokabeln löschen?")) { vocab = []; saveToStorage(); } }
    
    function exportList() {
        const blob = new Blob([JSON.stringify(vocab)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "vokabeln.json";
        a.click();
    }

    function importList(inputElement) {
        const file = inputElement.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            try {
                vocab = JSON.parse(e.target.result);
                saveToStorage();
                alert("Erfolgreich importiert!");
            } catch(e) { alert("Fehler beim Import!"); }
        };
        reader.readAsText(file);
    }
    
    // Enter-Taste zum Überprüfen
    document.getElementById("ansInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") check();
    });
</script>

</body>
</html>
