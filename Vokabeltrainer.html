<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer - Super Animation Fix</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --error: #dc3545; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --error: #ff4d4d; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            transition: 0.3s; margin: 0; min-height: 100vh;
        }

        .container { 
            background: var(--card); padding: 25px; border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 500px; 
            position: relative; z-index: 10; margin-top: 50px;
        }

        .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .top-bar button { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; border: none; background: #65676b; color: white; font-size: 0.8rem; }
        .btn-accent { background: var(--accent) !important; }

        input, select, .main-btn { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 1rem; }
        .main-btn { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        
        #feedback { min-height: 40px; margin: 15px 0; font-weight: bold; text-align: center; font-size: 1.5rem; }
        .hidden { display: none; }

        /* --- ANIMATIONEN --- */
        @keyframes jump {
            0% { transform: scale(1); }
            30% { transform: scale(1.1) translateY(-10px); }
            50% { transform: scale(0.9) translateY(0); }
            100% { transform: scale(1); }
        }
        .correct-anim { animation: jump 0.5s ease; border: 3px solid var(--success) !important; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .wrong-anim { animation: shake 0.4s ease; border: 3px solid var(--error) !important; }

        /* Konfetti-Stil */
        .confetti-piece {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 9999;
            bottom: -50px;
            animation: flyUp 2s forwards ease-out;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onload="loadFromStorage()">

<div class="container">
    <div class="top-bar">
        <button class="btn-accent" onclick="toggleDark()">🌓 Mode</button>
        <button onclick="exportList()">💾 Export</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import</button>
        <button onclick="clearList()" style="background: var(--error)">🗑️ Reset</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(this)" accept=".json">
    </div>

    <div id="inputArea">
        <h2>Vokabeln</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button class="main-btn" onclick="addWord()">Hinzufügen</button>
        <p style="text-align: center;">Anzahl: <b id="wordCount">0</b></p>
        <hr>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">START</button>
    </div>

    <div id="trainingArea" class="hidden">
        <div style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 10px;">
            Richtig: <span id="correctNum">0</span> von <span id="processedNum">0</span>
        </div>
        <h1 id="qWord" style="text-align: center; margin: 10px 0;">---</h1>
        <input type="text" id="ansInput" placeholder="Antwort..." autocomplete="off">
        <button class="main-btn" onclick="check()">Prüfen</button>
        <button class="main-btn" style="background: #65676b" onclick="skip()">Weiß nicht</button>
        <p id="feedback"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">🎉 Statistik</h2>
        <div id="statsDetails"></div>
        <button class="main-btn" onclick="location.reload()">Nochmal</button>
    </div>
</div>

<script>
    let vocab = [], session = [], wrongs = [], attempts = {}, currentIdx = 0, correctInSession = 0, task = {};

    function toggleDark() { document.body.classList.toggle('dark'); }

    function saveToStorage() {
        localStorage.setItem('vocab_final_safe', JSON.stringify(vocab));
        document.getElementById('wordCount').innerText = vocab.length;
    }

    function loadFromStorage() {
        const data = localStorage.getItem('vocab_final_safe');
        if (data) {
            vocab = JSON.parse(data);
            document.getElementById('wordCount').innerText = vocab.length;
        }
    }

    function addWord() {
        const f = document.getElementById('foreign').value.trim(), g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: Date.now() + Math.random()});
            saveToStorage();
            document.getElementById('foreign').value = ''; document.getElementById('german').value = '';
            document.getElementById('foreign').focus();
        }
    }

    function exportList() {
        const blob = new Blob([JSON.stringify(vocab)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "vokabeln.json"; a.click();
    }

    function importList(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            vocab = JSON.parse(e.target.result);
            saveToStorage();
            alert(vocab.length + " Wörter importiert!");
        };
        reader.readAsText(file);
    }

    function clearList() { if(confirm("Löschen?")) { vocab = []; saveToStorage(); } }

    function startTraining() {
        if(vocab.length === 0) return;
        session = [...vocab].sort(() => Math.random() - 0.5);
        wrongs = []; currentIdx = 0; correctInSession = 0; attempts = {};
        vocab.forEach(v => attempts[v.id] = 1);
        show('trainingArea');
        next();
    }

    function next() {
        if(currentIdx >= session.length) {
            if(wrongs.length > 0) {
                session = [...wrongs].sort(() => Math.random() - 0.5);
                wrongs = []; currentIdx = 0; next();
            } else { show('resultArea'); renderStats(); return; }
        }
        document.getElementById('correctNum').innerText = correctInSession;
        document.getElementById('processedNum').innerText = currentIdx + 1;
        
        let word = session[currentIdx], m = document.getElementById('mode').value;
        let askF = m === 'foreign' || (m === 'mixed' && Math.random() > 0.5);
        task = { q: askF ? word.g : word.f, a: askF ? word.f : word.g, id: word.id };
        document.getElementById('qWord').innerText = task.q;
        const inp = document.getElementById('ansInput');
        inp.value = ''; inp.className = ''; document.getElementById('feedback').innerText = '';
        inp.focus();
    }

    function check() {
        const inp = document.getElementById('ansInput');
        if(inp.value.trim().toLowerCase() === task.a.toLowerCase()) {
            if(!wrongs.includes(session[currentIdx])) correctInSession++;
            document.getElementById('feedback').innerText = "✨ SUPER! ✨";
            inp.classList.add('correct-anim');
            spawnConfetti();
            currentIdx++; setTimeout(next, 800);
        } else {
            document.getElementById('feedback').innerText = "💡 Lösung: " + task.a;
            inp.classList.add('wrong-anim');
            if(!wrongs.includes(session[currentIdx])) { wrongs.push(session[currentIdx]); attempts[task.id]++; }
            currentIdx++; setTimeout(next, 2000);
        }
    }

    function spawnConfetti() {
        const emojis = ['🎉','✨','⭐','🌟','🔥','🎈'];
        for(let i=0; i<20; i++) {
            const p = document.createElement('div');
            p.className = 'confetti-piece';
            p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDelay = (Math.random() * 0.5) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 2500);
        }
    }

    function skip() {
        document.getElementById('feedback').innerText = "💡 Lösung: " + task.a;
        if(!wrongs.includes(session[currentIdx])) { wrongs.push(session[currentIdx]); attempts[task.id]++; }
        currentIdx++; setTimeout(next, 2000);
    }

    function renderStats() {
        let h = "<ul>", s = {};
        Object.values(attempts).forEach(a => s[a] = (s[a] || 0) + 1);
        for(let a in s) h += `<li><b>${s[a]} Wörter</b> im ${a}. Versuch</li>`;
        document.getElementById('statsDetails').innerHTML = h + "</ul>";
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    document.getElementById('ansInput').onkeypress = (e) => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
