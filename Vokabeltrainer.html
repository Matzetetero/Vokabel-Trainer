<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer Pro</title>
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --btn-text: #ffffff;
        }
        body.dark {
            --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --btn-text: #ffffff;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: background 0.3s; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); width: 100%; max-width: 500px; }
        
        /* Obere Leiste mit Buttons */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .top-bar button { width: auto; flex: 1; font-size: 0.85rem; padding: 8px; }

        input, select, .main-btn { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 1rem; }
        .main-btn { cursor: pointer; background: var(--accent); color: var(--btn-text); border: none; font-weight: bold; transition: opacity 0.2s; }
        .main-btn:hover { opacity: 0.9; }
        .secondary-btn { background: #65676b; color: white; }
        
        .stats-live { font-size: 1.1rem; font-weight: bold; color: var(--success); text-align: center; margin-bottom: 15px; }
        #feedback { min-height: 24px; margin: 15px 0; font-weight: bold; text-align: center; }
        .hidden { display: none; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- NAVIGATION & MODUS -->
    <div class="top-bar">
        <button class="main-btn" onclick="toggleDark()">🌓 Dark Mode</button>
        <button class="main-btn secondary-btn" onclick="exportList()">💾 Speichern (Export)</button>
        <button class="main-btn secondary-btn" onclick="document.getElementById('importFile').click()">📂 Laden (Import)</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(event)" accept=".json">
    </div>

    <!-- EINGABE-BEREICH -->
    <div id="inputArea">
        <h2>Vokabeln hinzufügen</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache (z.B. Apple)" onkeydown="if(event.key==='Enter') document.getElementById('german').focus()">
        <input type="text" id="german" placeholder="Deutsch (z.B. Apfel)" onkeydown="if(event.key==='Enter') addWord()">
        <button class="main-btn" onclick="addWord()">Wort zur Liste hinzufügen</button>
        <p style="text-align: center;">Aktuelle Wörter: <span id="wordCount">0</span></p>
        
        <hr>
        <h3>Abfrage-Einstellungen</h3>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Zufällig gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">Training jetzt starten</button>
    </div>

    <!-- TRAINING-BEREICH -->
    <div id="trainingArea" class="hidden">
        <div class="stats-live">✅ Richtig gelöst: <span id="correctCount">0</span> von <span id="totalCount">0</span></div>
        <div style="text-align: center; font-size: 0.9rem; opacity: 0.7;">Übersetze dieses Wort:</div>
        <h1 id="qWord" style="text-align: center; margin: 10px 0;">---</h1>
        
        <input type="text" id="ansInput" placeholder="Deine Antwort hier..." autocomplete="off">
        <button class="main-btn" onclick="check()">Überprüfen</button>
        <button class="main-btn secondary-btn" onclick="skip()">Ich weiß es nicht</button>
        <p id="feedback"></p>
    </div>

    <!-- ERGEBNIS-BEREICH -->
    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">Training beendet!</h2>
        <p>Hier ist deine Auswertung:</p>
        <div id="statsDetails"></div>
        <button class="main-btn" onclick="location.reload()">Zurück zum Hauptmenü</button>
    </div>
</div>

<script>
    let vocab = [], session = [], wrongs = [], attempts = {};
    let correctInRound = 0, currentIdx = 0, task = {};

    // 1. DARK MODE SCHALTER
    function toggleDark() {
        document.body.classList.toggle('dark');
    }

    // 2. VOKABELN HINZUFÜGEN
    function addWord() {
        const f = document.getElementById('foreign').value.trim();
        const g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: Date.now() + Math.random()});
            document.getElementById('wordCount').innerText = vocab.length;
            document.getElementById('foreign').value = ''; 
            document.getElementById('german').value = '';
            document.getElementById('foreign').focus();
        }
    }

    // 3. EXPORT (SPEICHERN)
    function exportList() {
        if(vocab.length === 0) return alert("Liste ist leer!");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vocab));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "meine_vokabeln.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // 4. IMPORT (LADEN)
    function importList(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                vocab = JSON.parse(event.target.result);
                document.getElementById('wordCount').innerText = vocab.length;
                alert("Erfolgreich geladen!");
            } catch(err) { alert("Fehler beim Laden der Datei!"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    // TRAININGSLOGIK
    function startTraining() {
        if(vocab.length === 0) return alert("Bitte erst Wörter eingeben!");
        session = [...vocab].sort(() => Math.random() - 0.5);
        wrongs = []; correctInRound = 0; currentIdx = 0; attempts = {};
        vocab.forEach(v => attempts[v.id] = 1);
        show('trainingArea');
        next();
    }

    function next() {
        if(currentIdx >= session.length) {
            if(wrongs.length > 0) {
                alert("Runde fertig! Wir wiederholen die " + wrongs.length + " Fehler.");
                session = [...wrongs].sort(() => Math.random() - 0.5);
                wrongs = []; currentIdx = 0; next();
            } else { show('resultArea'); renderStats(); return; }
        }
        document.getElementById('correctCount').innerText = correctInRound;
        document.getElementById('totalCount').innerText = vocab.length;
        
        let word = session[currentIdx];
        let m = document.getElementById('mode').value;
        let askF = m === 'foreign' || (m === 'mixed' && Math.random() > 0.5);
        
        task = { q: askF ? word.g : word.f, a: askF ? word.f : word.g, id: word.id };
        document.getElementById('qWord').innerText = task.q;
        document.getElementById('ansInput').value = ''; 
        document.getElementById('feedback').innerText = '';
        document.getElementById('ansInput').focus();
    }

    function check() {
        let input = document.getElementById('ansInput').value.trim().toLowerCase();
        if(input === task.a.toLowerCase()) {
            if(!wrongs.includes(session[currentIdx])) correctInRound++;
            document.getElementById('feedback').style.color = "var(--success)";
            document.getElementById('feedback').innerText = "✅ Richtig!";
            currentIdx++; setTimeout(next, 700);
        } else {
            document.getElementById('feedback').style.color = "#cf6679";
            document.getElementById('feedback').innerText = "❌ Falsch! Lösung: " + task.a;
            markWrong();
        }
    }

    function skip() {
        document.getElementById('feedback').style.color = "#65676b";
        document.getElementById('feedback').innerText = "Lösung: " + task.a;
        markWrong();
    }

    function markWrong() {
        if(!wrongs.includes(session[currentIdx])) {
            wrongs.push(session[currentIdx]);
            attempts[task.id]++;
        }
        currentIdx++; setTimeout(next, 1800);
    }

    function renderStats() {
        let res = "<ul style='padding:0; list-style:none;'>", summary = {};
        Object.values(attempts).forEach(a => summary[a] = (summary[a] || 0) + 1);
        for(let a in summary) {
            res += `<li style='padding:8px; border-bottom:1px solid #444;'>📍 <b>${summary[a]} Wörter</b> im ${a}. Versuch gelöst</li>`;
        }
        document.getElementById('statsDetails').innerHTML = res + "</ul>";
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    document.getElementById('ansInput').onkeypress = (e) => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
