<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer Pro</title>
    <style>
        :root {
            --bg: #f4f4f9; --card: white; --text: #333; --accent: #007bff; --success: #28a745;
        }
        body.dark {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --success: #03dac6;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 500px; position: relative; }
        .top-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; }
        input, select, button { margin: 8px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; background: var(--card); color: var(--text); }
        button { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .btn-sec { background: #6c757d; }
        .stats-live { font-weight: bold; color: var(--success); margin-bottom: 10px; text-align: center; }
        #feedback { min-height: 20px; margin: 10px 0; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <button onclick="toggleDark()" style="width: auto; padding: 5px 10px;">🌓 Mode</button>
    </div>

    <!-- EINGABE -->
    <div id="inputArea">
        <h2>Vokabeln & Transfer</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button onclick="addWord()">Hinzufügen</button>
        <p>Wörter in Liste: <span id="wordCount">0</span></p>
        <hr>
        <button class="btn-sec" onclick="exportList()">Liste Exportieren (.json)</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(event)">
        <button class="btn-sec" onclick="document.getElementById('importFile').click()">Liste Importieren</button>
        <hr>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Gemischt</option>
        </select>
        <button onclick="startTraining()" style="background: var(--success)">Training starten</button>
    </div>

    <!-- TRAINING -->
    <div id="trainingArea" class="hidden">
        <div class="stats-live">Bereits richtig: <span id="correctCount">0</span> / <span id="totalCount">0</span></div>
        <h1 id="qWord">---</h1>
        <input type="text" id="ansInput" placeholder="Deine Antwort..." autocomplete="off">
        <button onclick="check()">Überprüfen</button>
        <button class="btn-sec" onclick="skip()">Ich weiß es nicht</button>
        <p id="feedback"></p>
    </div>

    <!-- RESULTAT -->
    <div id="resultArea" class="hidden">
        <h2>Ergebnis</h2>
        <div id="statsDetails"></div>
        <button onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let vocab = [], session = [], wrongs = [], attempts = {};
    let correctInRound = 0, currentIdx = 0, task = {};

    function toggleDark() { document.body.classList.toggle('dark'); }

    function addWord() {
        const f = document.getElementById('foreign').value.trim(), g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: vocab.length});
            document.getElementById('wordCount').innerText = vocab.length;
            document.getElementById('foreign').value = ''; document.getElementById('german').value = '';
        }
    }

    function startTraining() {
        if(vocab.length === 0) return;
        session = [...vocab].sort(() => Math.random() - 0.5);
        wrongs = []; correctInRound = 0; currentIdx = 0; attempts = {};
        vocab.forEach(v => attempts[v.id] = 1);
        show('trainingArea');
        next();
    }

    function next() {
        if(currentIdx >= session.length) {
            if(wrongs.length > 0) {
                alert("Runde beendet! Fehler werden wiederholt.");
                session = [...wrongs].sort(() => Math.random() - 0.5);
                wrongs = []; currentIdx = 0; next();
            } else { show('resultArea'); renderStats(); return; }
        }
        document.getElementById('correctCount').innerText = correctInRound;
        document.getElementById('totalCount').innerText = vocab.length;
        let word = session[currentIdx], m = document.getElementById('mode').value;
        let askF = m === 'foreign' || (m === 'mixed' && Math.random() > 0.5);
        task = { q: askF ? word.g : word.f, a: askF ? word.f : word.g, id: word.id };
        document.getElementById('qWord').innerText = task.q;
        document.getElementById('ansInput').value = ''; document.getElementById('feedback').innerText = '';
    }

    function check() {
        let input = document.getElementById('ansInput').value.trim().toLowerCase();
        if(input === task.a.toLowerCase()) {
            if(!wrongs.includes(session[currentIdx])) correctInRound++;
            document.getElementById('feedback').innerText = "✅ Richtig!";
            currentIdx++; setTimeout(next, 800);
        } else {
            document.getElementById('feedback').innerText = "❌ Falsch! Lösung: " + task.a;
            markWrong();
        }
    }

    function skip() {
        document.getElementById('feedback').innerText = "Lösung: " + task.a;
        markWrong();
    }

    function markWrong() {
        if(!wrongs.includes(session[currentIdx])) {
            wrongs.push(session[currentIdx]);
            attempts[task.id]++;
        }
        currentIdx++; setTimeout(next, 1500);
    }

    function renderStats() {
        let res = "<ul>", summary = {};
        Object.values(attempts).forEach(a => summary[a] = (summary[a] || 0) + 1);
        for(let a in summary) res += `<li>${summary[a]} Vokabel(n) im ${a}. Versuch gelöst</li>`;
        document.getElementById('statsDetails').innerHTML = res + "</ul>";
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function exportList() {
        let blob = new Blob([JSON.stringify(vocab)], {type: "application/json"});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = "vokabeln.json"; a.click();
    }

    function importList(e) {
        let reader = new FileReader();
        reader.onload = (event) => {
            vocab = JSON.parse(event.target.result);
            document.getElementById('wordCount').innerText = vocab.length;
            alert("Liste geladen!");
        };
        reader.readAsText(e.target.files[0]);
    }

    document.getElementById('ansInput').onkeypress = (e) => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
