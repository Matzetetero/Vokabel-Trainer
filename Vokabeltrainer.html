<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer - Flash Edition</title>
    <style>
        :root { --bg: #f0f2f5; --card: white; --text: #1c1e21; --accent: #007bff; --success: #28a745; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; }
        
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: background 0.2s; margin: 0; min-height: 100vh; overflow: hidden; }
        .container { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 400px; z-index: 10; margin-top: 50px; text-align: center; }
        
        /* DER SUPER-BLITZ */
        .flash-active { background: #28a745 !important; transition: 0.1s; }

        /* RIESEN-EMOJI ANIMATION */
        #superEmoji {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 150px; pointer-events: none; z-index: 1000; opacity: 0;
        }
        .emoji-pop { animation: pop 2s forwards; }
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            80% { transform: translate(-50%, -100%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -200%) scale(0.5); opacity: 0; }
        }

        input, button { margin: 10px 0; padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        button { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .hidden { display: none; }
        
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .correct-field { animation: bounce 0.5s ease; border: 3px solid #28a745 !important; }
    </style>
</head>
<body onload="load()">

<div id="superEmoji">🎉</div>

<div class="container">
    <div id="inputArea">
        <h2>Vokabeln</h2>
        <input type="text" id="f" placeholder="Fremdsprache">
        <input type="text" id="g" placeholder="Deutsch">
        <button onclick="add()">Hinzufügen</button>
        <p>Anzahl: <b id="count">0</b></p>
        <hr>
        <button style="background: #28a745" onclick="start()">START</button>
    </div>

    <div id="trainingArea" class="hidden">
        <p>Richtig: <span id="cNum">0</span> / <span id="pNum">0</span></p>
        <h1 id="q">---</h1>
        <input type="text" id="ans" placeholder="Antwort..." autocomplete="off">
        <button onclick="check()">Überprüfen</button>
        <p id="feed"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2>Fertig!</h2>
        <div id="res"></div>
        <button onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let v = [], s = [], wr = [], att = {}, cur = 0, ok = 0, task = {};

    function load() { 
        let d = localStorage.getItem('vok_v_final'); 
        if(d) { v = JSON.parse(d); document.getElementById('count').innerText = v.length; }
    }

    function add() {
        let f = document.getElementById('f').value, g = document.getElementById('g').value;
        if(f && g) { v.push({f,g,id:Date.now()}); localStorage.setItem('vok_v_final', JSON.stringify(v)); document.getElementById('count').innerText = v.length; document.getElementById('f').value=''; document.getElementById('g').value=''; document.getElementById('f').focus(); }
    }

    function start() {
        if(v.length === 0) return;
        s = [...v].sort(() => Math.random() - 0.5);
        wr = []; cur = 0; ok = 0; att = {}; v.forEach(x => att[x.id] = 1);
        document.getElementById('inputArea').classList.add('hidden');
        document.getElementById('trainingArea').classList.remove('hidden');
        next();
    }

    function next() {
        if(cur >= s.length) {
            if(wr.length > 0) { s = [...wr].sort(()=>Math.random()-0.5); wr = []; cur = 0; next(); }
            else { 
                document.getElementById('trainingArea').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
                render(); return; 
            }
        }
        document.getElementById('cNum').innerText = ok;
        document.getElementById('pNum').innerText = cur + 1;
        task = { q: s[cur].f, a: s[cur].g, id: s[cur].id };
        document.getElementById('q').innerText = task.q;
        document.getElementById('ans').value = '';
        document.getElementById('ans').className = '';
        document.getElementById('feed').innerText = '';
        document.getElementById('ans').focus();
    }

    function check() {
        let i = document.getElementById('ans');
        if(i.value.trim().toLowerCase() === task.a.toLowerCase()) {
            if(!wr.includes(s[cur])) ok++;
            
            // --- DIE SUPER ANIMATION ---
            document.body.classList.add('flash-active');
            let e = document.getElementById('superEmoji');
            e.innerText = ['🎉','⭐','🏆','🔥','✨'][Math.floor(Math.random()*5)];
            e.classList.remove('emoji-pop');
            void e.offsetWidth; // Trick zum Neustart der Animation
            e.classList.add('emoji-pop');
            i.classList.add('correct-field');
            
            setTimeout(() => document.body.classList.remove('flash-active'), 200);
            cur++; setTimeout(next, 1500);
        } else {
            document.getElementById('feed').innerText = "Falsch! Lösung: " + task.a;
            if(!wr.includes(s[cur])) { wr.push(s[cur]); att[task.id]++; }
            cur++; setTimeout(next, 2500);
        }
    }

    function render() {
        let h = "<ul>", sum = {};
        Object.values(att).forEach(x => sum[x] = (sum[x] || 0) + 1);
        for(let k in sum) h += `<li><b>${sum[k]} Wörter</b> im ${k}. Versuch</li>`;
        document.getElementById('res').innerHTML = h + "</ul>";
    }

    document.getElementById('ans').onkeypress = (e) => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
