<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer Pro</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --error: #dc3545; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --error: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: background 0.4s; margin: 0; }
        
        /* DER BLITZ-EFFEKT */
        body.correct-flash { background-color: var(--success) !important; }

        .container { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 500px; }
        .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .top-bar button { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; border: none; background: #65676b; color: white; font-size: 0.8rem; }
        input, select, .main-btn { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 1rem; }
        .main-btn { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .hidden { display: none; }
        #feedback { text-align: center; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body onload="loadFromStorage()">

<div class="container">
    <div class="top-bar">
        <button onclick="toggleDark()">🌓 Dark Mode</button>
        <button onclick="exportList()">💾 Export</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import</button>
        <button onclick="clearList()" style="background: var(--error)">🗑️ Löschen</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(this)" accept=".json">
    </div>

    <div id="inputArea">
        <h2>Vokabeln verwalten</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button class="main-btn" onclick="addWord()">Hinzufügen</button>
        <p style="text-align: center;">Wörter: <b id="wordCount">0</b></p>
        <hr>
        <label>Abfrage-Modus:</label>
        <select id="mode">
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="de">Deutsch abfragen</option>
            <option value="mixed">Zufällig gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">Training starten</button>
    </div>

    <div id="trainingArea" class="hidden">
        <h1 id="qWord" style="text-align: center;">---</h1>
        <input type="text" id="ansInput" placeholder="Antwort..." autocomplete="off">
        <button class="main-btn" onclick="check()">Überprüfen</button>
        <p id="feedback"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">Ergebnis</h2>
        <div id="statsDetails" style="text-align: center; font-size: 1.5rem;"></div>
        <button class="main-btn" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let vocab = [], session = [], currentIdx = 0, task = {}, correctInSession = 0;

    function toggleDark() { document.body.classList.toggle('dark'); }

    function saveToStorage() {
        localStorage.setItem('vocab_final', JSON.stringify(vocab));
        document.getElementById('wordCount').innerText = vocab.length;
    }

    function loadFromStorage() {
        vocab = JSON.parse(localStorage.getItem('vocab_final') || '[]');
        document.getElementById('wordCount').innerText = vocab.length;
    }

    function addWord() {
        const f = document.getElementById('foreign').value.trim(), g = document.getElementById('german').value.trim();
        if(f && g) { vocab.push({f, g}); saveToStorage(); document.getElementById('foreign').value = ''; document.getElementById('german').value = ''; }
    }

    function startTraining() {
        if(vocab.length === 0) return;
        session = [...vocab].sort(() => Math.random() - 0.5);
        currentIdx = 0; correctInSession = 0;
        show('trainingArea'); next();
    }

    function next() {
        if(currentIdx >= session.length) { show('resultArea'); document.getElementById('statsDetails').innerText = `${correctInSession} / ${session.length} richtig!`; return; }
        const word = session[currentIdx], mode = document.getElementById('mode').value;
        let askForeign = mode === 'foreign' || (mode === 'mixed' && Math.random() > 0.5);
        task = { q: askForeign ? word.g : word.f, a: askForeign ? word.f : word.g };
        document.getElementById('qWord').innerText = task.q;
        document.getElementById('ansInput').value = ''; document.getElementById('feedback').innerText = '';
        document.getElementById('ansInput').focus();
    }

    function check() {
        const inp = document.getElementById('ansInput');
        if(inp.value.trim().toLowerCase() === task.a.toLowerCase()) {
            document.body.classList.add('correct-flash'); // BLITZ AN
            correctInSession++;
            setTimeout(() => {
                document.body.classList.remove('correct-flash'); // BLITZ AUS
                currentIdx++; next();
            }, 600);
        } else {
            document.getElementById('feedback').innerText = `Falsch! Lösung: ${task.a}`;
            document.getElementById('feedback').style.color = "var(--error)";
        }
    }

    function exportList() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(vocab)], {type: "application/json"}));
        a.download = "vokabeln.json"; a.click();
    }

    function importList(el) {
        const reader = new FileReader();
        reader.onload = e => { vocab = JSON.parse(e.target.result); saveToStorage(); location.reload(); };
        reader.readAsText(el.files[0]);
    }

    function clearList() { if(confirm("Löschen?")) { vocab = []; saveToStorage(); } }
    function show(id) { ['inputArea', 'trainingArea', 'resultArea'].forEach(a => document.getElementById(a).classList.toggle('hidden', a !== id)); }
    document.getElementById("ansInput").addEventListener("keypress", (e) => e.key === "Enter" && check());
</script>
</body>
</html>
