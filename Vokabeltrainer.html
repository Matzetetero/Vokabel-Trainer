<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer Ultimate Fix</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --error: #dc3545; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --error: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 100%; max-width: 500px; }
        .top-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .top-bar button { flex: 1; min-width: 100px; padding: 10px; cursor: pointer; border-radius: 6px; border: none; background: #65676b; color: white; font-size: 0.8rem; }
        .btn-accent { background: var(--accent) !important; }
        input, select, .main-btn { margin: 10px 0; padding: 12px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 1rem; }
        .main-btn { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .stats-live { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 15px; color: var(--accent); }
        #feedback { min-height: 30px; margin: 15px 0; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .hidden { display: none; }
        @keyframes successPop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .correct-anim { animation: successPop 0.4s ease; border: 2px solid var(--success) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .wrong-anim { animation: shake 0.4s ease; border: 2px solid var(--error) !important; }
    </style>
</head>
<body onload="loadFromStorage()">

<div class="container">
    <div class="top-bar">
        <button class="btn-accent" onclick="toggleDark()">🌓 Dark Mode</button>
        <button onclick="exportList()">💾 Export</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import</button>
        <button onclick="clearList()" style="background: var(--error)">🗑️ Löschen</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(event)" accept=".json">
    </div>

    <div id="inputArea">
        <h2>Vokabeln</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button class="main-btn" onclick="addWord()">Hinzufügen</button>
        <p style="text-align: center;">Wörter in Liste: <span id="wordCount">0</span></p>
        <hr>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Zufällig gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">Training starten</button>
    </div>

    <div id="trainingArea" class="hidden">
        <div class="stats-live">Richtig: <span id="correctNum">0</span> von <span id="processedNum">0</span></div>
        <h1 id="qWord" style="text-align: center;">---</h1>
        <input type="text" id="ansInput" placeholder="Antwort..." autocomplete="off">
        <button class="main-btn" onclick="check()">Überprüfen</button>
        <button class="main-btn" style="background: #65676b" onclick="skip()">Weiß ich nicht</button>
        <p id="feedback"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">Fertig!</h2>
        <div id="statsDetails"></div>
        <button class="main-btn" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let vocab = [], session = [], wrongs = [], attempts = {};
    let correctInSession = 0, currentIdx = 0, task = {};

    function toggleDark() { document.body.classList.toggle('dark'); }

    // SPEICHERN & LADEN
    function saveToStorage() {
        localStorage.setItem('vocab_storage', JSON.stringify(vocab));
        document.getElementById('wordCount').innerText = vocab.length;
    }

    function loadFromStorage() {
        const data = localStorage.getItem('vocab_storage');
        if (data) {
            vocab = JSON.parse(data);
            document.getElementById('wordCount').innerText = vocab.length;
        }
    }

    function clearList() {
        if(confirm("Alles löschen?")) { vocab = []; saveToStorage(); }
    }

    function addWord() {
        const f = document.getElementById('foreign').value.trim(), g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: Date.now() + Math.random()});
            saveToStorage();
            document.getElementById('foreign').value = ''; document.getElementById('german').value = '';
            document.getElementById('foreign').focus();
        }
    }

    // EXPORT & IMPORT (FIXED)
    function exportList() {
        if(vocab.length === 0) return alert("Liste leer!");
        const blob = new Blob([JSON.stringify(vocab)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "vokabeltrainer_liste.json";
        a.click();
    }

    function importList(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    vocab = imported;
                    saveToStorage(); // Direkt speichern
                    alert("Import erfolgreich! " + vocab.length + " Wörter geladen.");
                }
            } catch (err) { alert("Ungültige Datei!"); }
        };
        reader.readAsText(file);
    }

    // TRAINING LOGIK
    function startTraining() {
        if(vocab.length === 0) return;
        session = [...vocab].sort(() => Math.random() - 0.5);
        wrongs = []; currentIdx = 0; correctInSession = 0; attempts = {};
        vocab.forEach(v => attempts[v.id] = 1);
        show('trainingArea');
        next();
    }

    function next() {
        if(currentIdx >= session.length) {
            if(wrongs.length > 0) {
                session = [...wrongs].sort(() => Math.random() - 0.5);
                wrongs = []; currentIdx = 0; next();
            } else { show('resultArea'); renderStats(); return; }
        }
        document.getElementById('correctNum').innerText = correctInSession;
        document.getElementById('processedNum').innerText = currentIdx + 1;
        let word = session[currentIdx], m = document.getElementById('mode').value;
        let askF = m === 'foreign' || (m === 'mixed' && Math.random() > 0.5);
        task = { q: askF ? word.g : word.f, a: askF ? word.f : word.g, id: word.id };
        document.getElementById('qWord').innerText = task.q;
        const inp = document.getElementById('ansInput');
        inp.value = ''; inp.className = ''; document.getElementById('feedback').innerText = '';
        inp.focus();
    }

    function check() {
        const inp = document.getElementById('ansInput');
        if(inp.value.trim().toLowerCase() === task.a.toLowerCase()) {
            if(!wrongs.includes(session[currentIdx])) correctInSession++;
            document.getElementById('feedback').innerText = "✅ Richtig!";
            inp.classList.add('correct-anim');
            currentIdx++; setTimeout(next, 700);
        } else {
            document.getElementById('feedback').innerText = "❌ Falsch! Lösung: " + task.a;
            inp.classList.add('wrong-anim');
            if(!wrongs.includes(session[currentIdx])) { wrongs.push(session[currentIdx]); attempts[task.id]++; }
            currentIdx++; setTimeout(next, 2000);
        }
    }

    function skip() {
        document.getElementById('feedback').innerText = "Lösung: " + task.a;
        if(!wrongs.includes(session[currentIdx])) { wrongs.push(session[currentIdx]); attempts[task.id]++; }
        currentIdx++; setTimeout(next, 2000);
    }

    function renderStats() {
        let h = "<ul>", s = {};
        Object.values(attempts).forEach(a => s[a] = (s[a] || 0) + 1);
        for(let a in s) h += `<li><b>${s[a]} Wörter</b> im ${a}. Versuch gelöst</li>`;
        document.getElementById('statsDetails').innerHTML = h + "</ul>";
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(i => document.getElementById(i).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    document.getElementById('ansInput').onkeypress = (e) => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
