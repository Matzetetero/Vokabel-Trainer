<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vokabeltrainer - Pro Edition</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --accent: #007bff; --success: #28a745; --error: #dc3545; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; --accent: #4599ff; --success: #2ecc71; --error: #ff4d4d; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            transition: background 0.4s ease; /* Der Blitz-Effekt */
            margin: 0; 
        }

        /* Effekt bei richtiger Antwort */
        body.correct-flash { background-color: var(--success) !important; }

        .container { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 500px; 
        }

        .top-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .top-bar button { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; border: none; background: #65676b; color: white; font-size: 0.8rem; }
        
        input, select, .main-btn { 
            margin: 10px 0; padding: 12px; width: 100%; 
            box-sizing: border-box; border-radius: 8px; 
            border: 1px solid #ccc; background: var(--card); 
            color: var(--text); font-size: 1rem; 
        }

        .main-btn { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: bold; }
        .hidden { display: none; }
        #feedback { text-align: center; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .wrong-anim { animation: shake 0.4s ease; border: 2px solid var(--error) !important; }
        
        .list-preview { margin-top: 15px; max-height: 100px; overflow-y: auto; font-size: 0.85rem; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body onload="loadFromStorage()">

<div class="container">
    <div class="top-bar">
        <button onclick="toggleDark()">🌓 Dark Mode</button>
        <button onclick="exportList()">💾 Export</button>
        <button onclick="document.getElementById('importFile').click()">📂 Import</button>
        <button onclick="clearList()" style="background: var(--error)">🗑️ Löschen</button>
        <input type="file" id="importFile" class="hidden" onchange="importList(this)" accept=".json">
    </div>

    <div id="inputArea">
        <h2>Vokabeln verwalten</h2>
        <input type="text" id="foreign" placeholder="Fremdsprache">
        <input type="text" id="german" placeholder="Deutsch">
        <button class="main-btn" onclick="addWord()">Hinzufügen</button>
        <p style="text-align: center;">Wörter: <b id="wordCount">0</b></p>
        <div id="preview" class="list-preview"></div>
        <hr>
        <label>Abfrage-Modus:</label>
        <select id="mode">
            <option value="de">Deutsch abfragen</option>
            <option value="foreign">Fremdsprache abfragen</option>
            <option value="mixed">Zufällig gemischt</option>
        </select>
        <button class="main-btn" style="background: var(--success)" onclick="startTraining()">Training starten</button>
    </div>

    <div id="trainingArea" class="hidden">
        <div style="text-align:center; margin-bottom:10px;">Fortschritt: <span id="progress">0</span></div>
        <h1 id="qWord" style="text-align: center;">---</h1>
        <input type="text" id="ansInput" placeholder="Antwort..." autocomplete="off">
        <button class="main-btn" onclick="check()">Überprüfen</button>
        <button class="main-btn" style="background: #65676b" onclick="next(true)">Überspringen</button>
        <p id="feedback"></p>
    </div>

    <div id="resultArea" class="hidden">
        <h2 style="text-align: center;">Ergebnis</h2>
        <div id="statsDetails" style="text-align: center; font-size: 1.5rem; margin-bottom: 20px;"></div>
        <button class="main-btn" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    let vocab = [], session = [], currentIdx = 0, task = {}, correctInSession = 0;

    function toggleDark() { document.body.classList.toggle('dark'); }

    // Automatisches Speichern
    function saveToStorage() {
        localStorage.setItem('vocab_v5_data', JSON.stringify(vocab));
        updateUI();
    }

    function loadFromStorage() {
        const stored = localStorage.getItem('vocab_v5_data');
        if (stored) vocab = JSON.parse(stored);
        updateUI();
    }

    function updateUI() {
        document.getElementById('wordCount').innerText = vocab.length;
        const preview = document.getElementById('preview');
        preview.innerHTML = vocab.length > 0 ? 
            "<b>Zuletzt hinzugefügt:</b><br>" + vocab.slice(-3).map(v => `${v.f} = ${v.g}`).join('<br>') : 
            "Keine Wörter vorhanden.";
    }

    function addWord() {
        const f = document.getElementById('foreign').value.trim();
        const g = document.getElementById('german').value.trim();
        if(f && g) {
            vocab.push({f, g, id: Date.now()});
            saveToStorage();
            document.getElementById('foreign').value = '';
            document.getElementById('german').value = '';
            document.getElementById('foreign').focus();
        }
    }

    function startTraining() {
        if(vocab.length === 0) return alert("Füge erst Vokabeln hinzu!");
        session = [...vocab].sort(() => Math.random() - 0.5);
        currentIdx = 0;
        correctInSession = 0;
        show('trainingArea');
        next();
    }

    function next(skipped = false) {
        if (skipped) currentIdx++;
        if(currentIdx >= session.length) {
            show('resultArea');
            document.getElementById('statsDetails').innerText = `Fertig! ${correctInSession} von ${session.length} richtig.`;
            return;
        }
        
        const word = session[currentIdx];
        const mode = document.getElementById('mode').value;
        // Bestimmen, was gefragt wird
        let askForeign = mode === 'foreign' || (mode === 'mixed' && Math.random() > 0.5);
        
        task = {
            q: askForeign ? word.g : word.f,
            a: askForeign ? word.f : word.g
        };

        document.getElementById('progress').innerText = `${currentIdx + 1} / ${session.length}`;
        document.getElementById('qWord').innerText = task.q;
        const inp = document.getElementById('ansInput');
        inp.value = ''; inp.className = '';
        document.getElementById('feedback').innerText = '';
        inp.focus();
    }

    function check() {
        const inp = document.getElementById('ansInput');
        const fb = document.getElementById('feedback');
        
        if(inp.value.trim().toLowerCase() === task.a.toLowerCase()) {
            // GRÜNER BLITZ EFFEKT
            document.body.classList.add('correct-flash');
            fb.innerText = "Richtig! ✨";
            fb.style.color = "var(--success)";
            correctInSession++;
            
            setTimeout(() => {
                document.body.classList.remove('correct-flash');
                currentIdx++;
                next();
            }, 700);
        } else {
            inp.classList.add('wrong-anim');
            fb.innerText = `Falsch! Lösung: ${task.a}`;
            fb.style.color = "var(--error)";
        }
    }

    function exportList() {
        const blob = new Blob([JSON.stringify(vocab)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "vokabeln.json";
        a.click();
    }

    function importList(inputElement) {
        const file = inputElement.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                vocab = JSON.parse(e.target.result);
                saveToStorage();
                alert("Import erfolgreich!");
            } catch(err) { alert("Fehler beim Import!"); }
        };
        reader.readAsText(file);
    }

    function clearList() {
        if(confirm("Wirklich ALLES löschen?")) { vocab = []; saveToStorage(); }
    }

    function show(id) {
        ['inputArea', 'trainingArea', 'resultArea'].forEach(a => {
            document.getElementById(a).classList.toggle('hidden', a !== id);
        });
    }

    document.getElementById("ansInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") check();
    });
</script>

</body>
</html>
